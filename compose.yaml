# version: "3.8"
name: logitrackpro-dev
services:
  postgresql:
    image: postgres:16.3
    ports:
      - "5432:5432"
    env_file:
      - envs/.env.postgres
    networks:
      - logitrackpro
    volumes:
      - postgresql-data:/var/lib/postgresql/data

volumes:
  postgresql-data:

networks:
  logitrackpro:
    driver: bridge
